llvm:
  ninja: true
  default_config: release
  state:
    version:
      major: 19
  configs:
    release:
      options:
        CMAKE_BUILD_TYPE: Release
        LLVM_BUILD_TOOLS: true
        LLVM_ENABLE_ASSERTIONS: false
        LLVM_OPTIMIZED_TABLEGEN: true
        LLVM_ENABLE_PROJECTS: [clang, lld]
        LLVM_TARGETS_TO_BUILD: [X86, RISCV]
        LLVM_USE_RELATIVE_PATHS_IN_DEBUG_INFO: true  # for ccache
        CMAKE_INSTALL_DO_STRIP: true
        # LLVM_BUILD_LLVM_DYLIB: true
        # LLVM_LINK_LLVM_DYLIB: true
        LLVM_BUILD_LLVM_DYLIB: false
        LLVM_LINK_LLVM_DYLIB: false
        # LLVM_BUILD_STATIC_LIBS: false
        LLVM_INCLUDE_TESTS: false
        LLVM_INCLUDE_BENCHMARKS: false
        LLVM_INCLUDE_DOCS: false
        LLVM_BUILD_TESTS: false
        LLVM_INCLUDE_EXAMPLES: false
        LLVM_BUILD_DOCS: false
        # LLVM_BUILD_RUNTIME: false
    release_assertions:
      options:
        CMAKE_BUILD_TYPE: Release
        LLVM_BUILD_TOOLS: true
        LLVM_ENABLE_ASSERTIONS: true
        LLVM_OPTIMIZED_TABLEGEN: true
        LLVM_ENABLE_PROJECTS: [clang, lld]
        LLVM_TARGETS_TO_BUILD: [X86, RISCV]
        LLVM_USE_RELATIVE_PATHS_IN_DEBUG_INFO: true  # for ccache
        CMAKE_INSTALL_DO_STRIP: true
    debug:
      options:
        CMAKE_BUILD_TYPE: Debug
        LLVM_BUILD_TOOLS: true
        LLVM_ENABLE_ASSERTIONS: true
        LLVM_OPTIMIZED_TABLEGEN: true
        LLVM_ENABLE_PROJECTS: [clang, lld]
        LLVM_TARGETS_TO_BUILD: [X86, RISCV]
        LLVM_PARALLEL_LINK_JOBS: 8
        # LLVM_USE_LINKER: lld
        LLVM_USE_RELATIVE_PATHS_IN_DEBUG_INFO: true  # for ccache
        CMAKE_INSTALL_DO_STRIP: true
